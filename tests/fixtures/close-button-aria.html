<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト — 閉じるボタン（aria-label）</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    #status { margin-top: 20px; padding: 16px; border: 2px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>閉じるボタン テスト: aria-label="Close"</h1>
  <p>3秒後に Interstitial が表示され、aria-label="Close" のボタンが自動クリックされるはず。</p>
  <div id="status">待機中...</div>

  <script>
    setTimeout(() => {
      document.getElementById('status').textContent = 'Interstitial 表示中...';

      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center;';

      const box = document.createElement('div');
      box.style.cssText = 'background:white; padding:40px; border-radius:8px; text-align:center;';
      box.innerHTML = '<h2>Ad Content</h2><p>This is an interstitial ad.</p><iframe src="about:blank" width="300" height="200" style="border:1px solid #ccc;"></iframe>';

      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.style.cssText = 'position:absolute; top:10px; right:10px; background:none; border:none; color:white; font-size:28px; cursor:pointer;';
      closeBtn.addEventListener('click', () => {
        overlay.remove();
        document.getElementById('status').textContent = '✅ Interstitial が閉じられました（aria-label クリック）';
      });

      overlay.appendChild(closeBtn);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
    }, 3000);
  </script>
</body>
</html>
