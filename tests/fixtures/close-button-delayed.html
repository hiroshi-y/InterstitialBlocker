<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト — 遅延表示の閉じるボタン（Layer 4）</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    #status { margin-top: 20px; padding: 16px; border: 2px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>遅延閉じるボタン テスト: Layer 4 継続監視</h1>
  <p>3秒後に Interstitial が表示され、さらに4秒後に閉じるボタンが出現します。</p>
  <p>Layer 4 が閉じるボタン出現を検知し、自動クリックするはず。</p>
  <div id="status">待機中...</div>

  <script>
    setTimeout(() => {
      document.getElementById('status').textContent = 'Interstitial 表示中（閉じるボタンは4秒後に出現）...';

      const overlay = document.createElement('div');
      overlay.id = 'delayed-close-overlay';
      overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center;';

      const box = document.createElement('div');
      box.style.cssText = 'background:white; padding:40px; border-radius:8px; text-align:center;';
      box.innerHTML = '<h2>Please wait...</h2><p>Ad will be closeable soon.</p><iframe src="about:blank" width="300" height="200" style="border:1px solid #ccc;"></iframe>';

      overlay.appendChild(box);
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      // 4秒後に閉じるボタンを追加
      setTimeout(() => {
        document.getElementById('status').textContent = '閉じるボタンが出現しました...';

        const closeBtn = document.createElement('button');
        closeBtn.textContent = '×';
        closeBtn.setAttribute('aria-label', 'Close ad');
        closeBtn.style.cssText = 'position:absolute; top:10px; right:10px; background:none; border:none; color:white; font-size:28px; cursor:pointer;';
        closeBtn.addEventListener('click', () => {
          overlay.remove();
          document.body.style.overflow = '';
          document.getElementById('status').textContent = '✅ 遅延閉じるボタンが自動クリックされました（Layer 4 成功）';
        });

        overlay.appendChild(closeBtn);
      }, 4000);
    }, 3000);
  </script>
</body>
</html>
