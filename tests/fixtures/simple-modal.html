<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト — シンプルなInterstitialモーダル</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <h1>シンプルなInterstitialモーダル テスト</h1>
  <p>ボタンを押すと、典型的なInterstitialオーバーレイが表示されます。</p>
  <p>コンソールで [InterstitialBlocker] Detected が出ればスコアリング成功。</p>
  <button id="trigger">Interstitial を表示</button>

  <script>
    document.getElementById('trigger').addEventListener('click', () => {
      // 2.5秒遅延 — ユーザークリックの2秒スキップ閾値を超える
      setTimeout(() => {
        const overlay = document.createElement('div');
        overlay.id = 'ad-overlay';
        overlay.style.cssText = `
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: rgba(0, 0, 0, 0.8);
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
        `;

        const box = document.createElement('div');
        box.style.cssText = `
          background: white;
          padding: 40px;
          border-radius: 8px;
          text-align: center;
          max-width: 500px;
        `;
        box.innerHTML = `
          <h2>Special Offer!</h2>
          <p>Get 50% off today only!</p>
          <iframe src="about:blank" width="300" height="250" style="border:1px solid #ccc;"></iframe>
        `;

        const closeBtn = document.createElement('button');
        closeBtn.textContent = '×';
        closeBtn.setAttribute('aria-label', 'Close');
        closeBtn.style.cssText = `
          position: absolute;
          top: 10px; right: 10px;
          background: none; border: none;
          color: white; font-size: 30px;
          cursor: pointer;
        `;
        closeBtn.onclick = () => overlay.remove();

        overlay.appendChild(closeBtn);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
      }, 2500);
    });
  </script>

  <!-- スクロール用 -->
  <div style="margin-top: 40px;">
    <script>
      for (let i = 0; i < 30; i++) {
        document.write('<p>コンテンツ行 ' + (i+1) + '</p>');
      }
    </script>
  </div>
</body>
</html>
