<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト — 閉じるボタンなし（強制除去フォールバック）</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    #status { margin-top: 20px; padding: 16px; border: 2px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>閉じるボタンなし テスト: Layer 3 強制除去</h1>
  <p>3秒後に閉じるボタンの無い Interstitial が表示されます。</p>
  <p>Layer 4 でボタン出現を待ち（最大8秒）、タイムアウト後に Layer 3 で強制非表示にされるはず。</p>
  <div id="status">待機中...</div>

  <script>
    setTimeout(() => {
      document.getElementById('status').textContent = 'Interstitial 表示中（閉じるボタンなし）...';

      const overlay = document.createElement('div');
      overlay.id = 'no-close-overlay';
      overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center;';

      const box = document.createElement('div');
      box.style.cssText = 'background:white; padding:40px; border-radius:8px; text-align:center;';
      box.innerHTML = '<h2>Full Screen Ad</h2><p>No close button available.</p><iframe src="about:blank" width="300" height="200" style="border:1px solid #ccc;"></iframe>';

      overlay.appendChild(box);
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      // 状態監視
      const check = setInterval(() => {
        const el = document.getElementById('no-close-overlay');
        if (!el || getComputedStyle(el).display === 'none') {
          clearInterval(check);
          document.getElementById('status').textContent = '✅ Layer 3 で強制非表示にされました';
        }
      }, 500);
    }, 3000);
  </script>
</body>
</html>
